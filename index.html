<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>面状异物监测</title>
    <!-- 引入 Cesium 基础 lib（匹配 src/map-kit 里对 globalThis.Cesium 的依赖） -->
    <link href="/lib/Cesium/Widgets/widgets.css" rel="stylesheet" type="text/css" />
    <script src="/lib/Cesium/Cesium.js" type="text/javascript"></script>
    <script src="/lib/turf/turf.min.js" type="text/javascript"></script>

    <!-- 引入 mars3d 库 lib（匹配 src/map-kit 里对 globalThis.mars3d 的依赖） -->
    <link href="/lib/mars3d/mars3d.css" rel="stylesheet" type="text/css" />
    <script src="/lib/mars3d/mars3d.js" type="text/javascript"></script>
    <!-- Mars3D 插件库（按需；你的 lib 方法里推荐也引入） -->
    <script
      src="/lib/mars3d/plugins/space/mars3d-space.js"
      type="text/javascript"
    ></script>

    <!-- 运行时地图配置（部署后可改，无需重新打包） -->
    <script src="/app-config.js"></script>
    <script src="/config.js"></script>
    <script src="/map-scene.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
